[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [
    {access = "read", path = "./out"},
    {access = "read", path = "./lib"}
]

[lint]
# Forge 1.5+ runs Solar lint on every build. The uniswap-hooks lib has a
# relative import inside test/utils that trips Solar's stricter rules —
# but it isn't ours to fix and we don't consume that file in our tests.
# Disable lint-on-build here; run `forge lint contracts/` explicitly when needed.
lint_on_build = false

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"

[etherscan]
sepolia = {key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api"}
mainnet = {key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/api"}
